apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-bootstrap
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_GIT_USERNAME/openshift-gitops-servicemesh.git'
    targetRevision: HEAD
    path: argocd/infra
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
