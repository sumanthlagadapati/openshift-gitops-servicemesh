apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-mesh-control-plane
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_GIT_USERNAME/openshift-gitops-servicemesh.git'
    targetRevision: HEAD
    path: charts/service-mesh-control-plane
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
